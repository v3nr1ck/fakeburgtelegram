# Build the newspaper into the repo root (GitHub Pages is set to main / root)
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Only rebuild when content/source changes — skip our own rebuild commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: |
          pip install pyyaml
          python build.py

      - name: Publish dist to repo root
        run: |
          set -e
          # wipe previous generated page trees (keep source)
          rm -rf about category classifieds contact letter-to-the-editor privacy-policy search \
                 submit-an-obituary submit-anniversary submit-birth submit-engagement \
                 submit-guest-column submit-news-tip submit-scores submit-wedding weather 2026 docs
          rm -f index.html robots.txt rss.xml
          # copy fresh build
          cp -a dist/. .
          echo "fakeburgtelegram.com" > CNAME
          touch .nojekyll
          # keep developer readme out of Pages homepage slot
          if [ -f README.md ]; then mv -f README.md DEV-README.md; fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: publish built site [skip ci]"
            git push
          fi
