# Build the newspaper into the repo root (GitHub Pages = main / root)
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so future-dated articles go live automatically
  schedule:
    # 11:00 UTC ≈ 7:00 AM Eastern
    - cron: "0 11 * * *"

# Required so github-actions[bot] can push the built HTML back to main
permissions:
  contents: write

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip bot's own "publish built site" commits on push; always run on schedule / manual
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - uses: actions/checkout@v4
        with:
          # Explicit token with write (from permissions: contents: write above)
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site (respects article dates / publish_date)
        env:
          TZ: America/New_York
        run: |
          pip install pyyaml
          python build.py

      - name: Publish dist to repo root
        run: |
          set -e
          # wipe previous generated page trees (keep source)
          rm -rf about category classifieds contact letter-to-the-editor privacy-policy search \
                 submit-an-obituary submit-anniversary submit-birth submit-engagement \
                 submit-guest-column submit-news-tip submit-scores submit-wedding weather \
                 2025 2026 2027 docs
          rm -f index.html robots.txt rss.xml
          # copy fresh build
          cp -a dist/. .
          echo "fakeburgtelegram.com" > CNAME
          touch .nojekyll
          if [ -f README.md ]; then mv -f README.md DEV-README.md; fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: publish built site [skip ci]"
            git push origin HEAD:main
          fi
