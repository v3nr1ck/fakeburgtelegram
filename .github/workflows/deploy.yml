# Build Markdown → static HTML into docs/ and publish to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps & build
        run: |
          pip install pyyaml
          python build.py
          rm -rf docs
          cp -r dist docs
          echo "fakeburgtelegram.com" > docs/CNAME

      # Keep docs/ on main so "Deploy from branch → /docs" always works
      - name: Commit docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs
          if git diff --staged --quiet; then
            echo "No docs changes"
          else
            git commit -m "chore: rebuild site into docs/ [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
